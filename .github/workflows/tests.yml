name: SampleWishApp Tests

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare TestData.xlsx
        run: |
          ls -la TestData.xlsx || echo "TestData.xlsx not found in repo"

      - name: Build Docker image
        run: docker build -t samplewishapp .

      - name: Run Docker container
        run: |
          docker run -d --name wishapp-container \
            -p 8080:8080 \
            samplewishapp

      - name: Wait for Tomcat
        run: |
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:8080/SampleWishApp/Upload.jsp)
            [ "$STATUS" = "200" ] && break || sleep 5
          done

      - name: Run Selenium Tests
        run: |
          curl -X POST http://localhost:8080/SampleWishApp/TestRunnerServlet \
            -F "testDataFile=@TestData.xlsx" \
            --output TestResults.xlsx --fail

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xlsx
